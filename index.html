<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <a class="logo" href="#">Nocturne Finances <i class="fa-solid fa-coins"></i></a>
        </div>

        <nav class="navbar">
            <ul>
                <li><a href="#">Vault</a></li>
                <li><a href="#">Analytics</a></li>
                <li><a href="#">Activity</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
            <div class="nav-user-info">
                <a href="#"><i class="fa-solid fa-bell"></i></a>
                <a href="#"><i class="fa-regular fa-circle-user"></i></a>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="balance-info">
            <span class="balance-text">Total Balance</span>
            <h1 id="current-balance">$0</h1>
            <span class="metric-container">
                +12.5% This Month
            </span>
        </div>

        <section class="income-expense-container">

             <div class="income-container balance-contianer">
                <div class="income-info box">
                    <span >Total Income</span>
                    <h2 class="income">$0</h2>
                </div>
                <img class="trend" src="/imgs/up.svg" alt="">
            </div>
        

            <div class="expense-container balance-contianer">
                <div class="expense-info box">
                    <span>Total Expenses</span>
                    <h2 class="expense">$0</h2>
                </div>
                <img class="trend" src="/imgs/down.svg" alt="">
            </div>
        
        </section>


        <section class="transaction-contianer">
            <h3>New Transaction</h3>

            <div class="input-group">
                <div class="box">
                    <label for="desc">Description</label>
                    <input type="text" id="desc" placeholder="e.g. Monthly Rent">
                </div>
                <div class="box">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="0.00">
                </div>
                <div class="box">
                    <label for="type">Type</label>
                    <select name="type" id="type">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>

                <div class="btn">
                    <button class="add-btn">Add</button>
                </div>
                
            </div>

        </section>

        <section class="activity-container">
            <div class="activity-nav">
                <p>Recent Activity</p>
                <span>View All</span>
            </div>

            <div class="transaction-container">
                
            </div>

        </section>
        

    </main>
    


    <script src="app.js"></script>
</body>
</html>
